name: Build MSI

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-msi:
    name: Build Windows MSI
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare updater signing key
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          $privateKey = $env:TAURI_SIGNING_PRIVATE_KEY -replace '\\n', "`n"

          if ([string]::IsNullOrWhiteSpace($privateKey)) {
            throw "TAURI_SIGNING_PRIVATE_KEY is empty."
          }

          "TAURI_SIGNING_PRIVATE_KEY<<EOF" >> $env:GITHUB_ENV
          $privateKey >> $env:GITHUB_ENV
          "EOF" >> $env:GITHUB_ENV

      - name: Build MSI
        env:
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --bundles msi

      - name: Upload MSI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sgp-v4-windows-msi
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.msi.sig
            src-tauri/target/release/bundle/msi/latest.json
          if-no-files-found: error
