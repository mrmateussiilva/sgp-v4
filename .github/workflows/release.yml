name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-windows:
    name: Build and release Windows
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect package manager
        id: package-manager
        shell: pwsh
        run: |
          if (Test-Path "pnpm-lock.yaml") {
            "manager=pnpm" >> $env:GITHUB_OUTPUT
            "install-command=pnpm install --frozen-lockfile" >> $env:GITHUB_OUTPUT
            "tauri-script=pnpm tauri" >> $env:GITHUB_OUTPUT
          } elseif (Test-Path "yarn.lock") {
            "manager=yarn" >> $env:GITHUB_OUTPUT
            "install-command=yarn install --frozen-lockfile" >> $env:GITHUB_OUTPUT
            "tauri-script=yarn tauri" >> $env:GITHUB_OUTPUT
          } else {
            "manager=npm" >> $env:GITHUB_OUTPUT
            if (Test-Path "package-lock.json") {
              "install-command=npm ci" >> $env:GITHUB_OUTPUT
            } else {
              "install-command=npm install" >> $env:GITHUB_OUTPUT
            }
            "tauri-script=npm run tauri" >> $env:GITHUB_OUTPUT
          }

      - name: Setup pnpm
        if: steps.package-manager.outputs.manager == 'pnpm'
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        if: steps.package-manager.outputs.manager == 'yarn'
        shell: pwsh
        run: corepack enable

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        shell: pwsh
        run: ${{ steps.package-manager.outputs.install-command }}

      - name: Prepare updater signing key
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          $privateKey = $env:TAURI_SIGNING_PRIVATE_KEY -replace '\\n', "`n"

          if ([string]::IsNullOrWhiteSpace($privateKey)) {
            throw "TAURI_SIGNING_PRIVATE_KEY is empty."
          }

          "TAURI_SIGNING_PRIVATE_KEY<<EOF" >> $env:GITHUB_ENV
          $privateKey >> $env:GITHUB_ENV
          "EOF" >> $env:GITHUB_ENV

      - name: Build Tauri app and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Release ${{ github.ref_name }}"
          releaseBody: ""
          generateReleaseNotes: true
          prerelease: false
          tauriScript: ${{ steps.package-manager.outputs.tauri-script }}
          args: --bundles msi
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true
          updaterJsonPreferNsis: false

      - name: Update updater manifest on main
        shell: pwsh
        run: |
          $manifestSource = "src-tauri/target/release/bundle/msi/latest.json"
          if (!(Test-Path $manifestSource)) {
            throw "Generated updater manifest not found at $manifestSource."
          }

          $manifestTemp = Join-Path $env:RUNNER_TEMP "latest.json"
          Copy-Item $manifestSource $manifestTemp -Force

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main

          Copy-Item $manifestTemp "updater/latest.json" -Force
          git add updater/latest.json
          git diff --cached --quiet

          if ($LASTEXITCODE -eq 0) {
            "updater/latest.json already matches $env:GITHUB_REF_NAME."
            exit 0
          }

          if ($LASTEXITCODE -ne 1) {
            throw "Failed to check updater/latest.json changes."
          }

          git commit -m "chore: update updater manifest for $env:GITHUB_REF_NAME"
          git push origin HEAD:main

      - name: Upload MSI artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sgp-v4-windows-msi-${{ github.ref_name }}
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.msi.sig
            src-tauri/target/release/bundle/msi/latest.json
          if-no-files-found: error
