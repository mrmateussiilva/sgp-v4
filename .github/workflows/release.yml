name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-windows:
    name: Build and release Windows
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect package manager
        id: package-manager
        shell: pwsh
        run: |
          if (Test-Path "pnpm-lock.yaml") {
            "manager=pnpm" >> $env:GITHUB_OUTPUT
            "install-command=pnpm install --frozen-lockfile" >> $env:GITHUB_OUTPUT
            "tauri-script=pnpm tauri" >> $env:GITHUB_OUTPUT
          } elseif (Test-Path "yarn.lock") {
            "manager=yarn" >> $env:GITHUB_OUTPUT
            "install-command=yarn install --frozen-lockfile" >> $env:GITHUB_OUTPUT
            "tauri-script=yarn tauri" >> $env:GITHUB_OUTPUT
          } else {
            "manager=npm" >> $env:GITHUB_OUTPUT
            if (Test-Path "package-lock.json") {
              "install-command=npm ci" >> $env:GITHUB_OUTPUT
            } else {
              "install-command=npm install" >> $env:GITHUB_OUTPUT
            }
            "tauri-script=npm run tauri" >> $env:GITHUB_OUTPUT
          }

      - name: Setup pnpm
        if: steps.package-manager.outputs.manager == 'pnpm'
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        if: steps.package-manager.outputs.manager == 'yarn'
        shell: pwsh
        run: corepack enable

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        shell: pwsh
        run: ${{ steps.package-manager.outputs.install-command }}

      - name: Build Tauri app and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Release ${{ github.ref_name }}"
          releaseBody: ""
          generateReleaseNotes: true
          prerelease: false
          tauriScript: ${{ steps.package-manager.outputs.tauri-script }}
          args: --bundles msi
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true
          updaterJsonPreferNsis: false
